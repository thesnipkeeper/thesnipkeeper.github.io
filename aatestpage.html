        // Function to translate from English to Conlang
        function translateToConlang(sentence) {
            return sentence.split(' ').map(word => englishToConlang[word.toLowerCase()] || word).join(' ');

        // Function to translate from Conlang to English
        function translateToEnglish(sentence) {
            return sentence.split(' ').map(word => conlangToEnglish[word.toLowerCase()] || word).join(' ');
